<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>大戶選股 — 籌碼追蹤儀表板</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --accent: #4f8ef7;
    --green: #22c55e;
    --yellow: #eab308;
    --orange: #f97316;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* ── Header ── */
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.5px; }
  header span.sub { font-size: .8rem; color: var(--muted); }
  .status-pill { margin-left: auto; font-size: .75rem; background: #1e2535; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; color: var(--muted); }

  /* ── Tab Nav ── */
  nav { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--card); }
  nav button { background: none; border: none; color: var(--muted); padding: 12px 24px; cursor: pointer; font-size: .9rem; border-bottom: 3px solid transparent; transition: .15s; }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  nav button:hover:not(.active) { color: var(--text); }

  /* ── Layout ── */
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Card ── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card h3 { font-size: .9rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }

  /* ── Form Row ── */
  .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: .8rem; color: var(--muted); }
  input[type=text], input[type=password], input[type=number], select {
    background: #0f1117; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 8px 12px; font-size: .9rem; outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input[type=text] { min-width: 120px; }

  /* ── Buttons ── */
  .btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 8px 18px; cursor: pointer; font-size: .9rem; font-weight: 600; transition: opacity .15s; white-space: nowrap; }
  .btn:hover { opacity: .85; }
  .btn.sm { padding: 5px 12px; font-size: .8rem; }
  .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn.danger { background: var(--red); }
  .btn.green { background: var(--green); }

  /* ── Table ── */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th { color: var(--muted); font-weight: 600; text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 10px; border-bottom: 1px solid #1e2230; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1e2230; }

  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--muted); }

  /* ── Watchlist ── */
  #watchlist-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .chip { background: #1e2535; border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: .85rem; display: flex; align-items: center; gap: 8px; }
  .chip .del { cursor: pointer; color: var(--muted); font-size: .9rem; }
  .chip .del:hover { color: var(--red); }

  /* ── Stock Chart Area ── */
  #stock-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .metric { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .metric .val { font-size: 1.6rem; font-weight: 700; margin-top: 6px; }
  .metric .lbl { font-size: .75rem; color: var(--muted); }

  /* ── Signal Badge ── */
  .sig { display: inline-flex; align-items: center; gap: 5px; font-size: .82rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 30px; right: 30px; background: #22c55e; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: .9rem; opacity: 0; transform: translateY(20px); transition: .3s; pointer-events: none; z-index: 999; max-width: 320px; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.err { background: var(--red); }

  /* ── Loading ── */
  .loading { text-align: center; color: var(--muted); padding: 40px; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Settings ── */
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }

  /* ── Push Log ── */
  .log-item { display: flex; gap: 12px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
  .log-item:last-child { border-bottom: none; }

  hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
</style>
</head>
<body>

<header>
  <h1>📈 大戶選股</h1>
  <span class="sub">台股籌碼追蹤儀表板</span>
  <div class="status-pill" id="status-pill">載入中...</div>
</header>

<nav>
  <button class="active" onclick="switchTab('stock')">個股分析</button>
  <button onclick="switchTab('market')">全市場排行</button>
  <button onclick="switchTab('settings')">設定 / 推播</button>
</nav>

<main>

<!-- ═══════════════════════════════════════════════ 個股 ═══ -->
<div id="tab-stock" class="tab-content active">

  <div class="card">
    <h3>觀察清單</h3>
    <div class="row">
      <div class="field">
        <label>股票代號</label>
        <input type="text" id="new-stock-id" placeholder="例：2330" maxlength="6" style="width:110px" />
      </div>
      <div class="field">
        <label>名稱（選填）</label>
        <input type="text" id="new-stock-name" placeholder="台積電" style="width:120px" />
      </div>
      <button class="btn sm" onclick="addStock()">+ 新增</button>
      <button class="btn sm ghost" onclick="triggerRefresh()" id="btn-refresh">🔄 更新資料</button>
      <div class="field">
        <label>回填天數</label>
        <input type="number" id="backfill-days" value="30" min="1" max="90" style="width:70px" />
      </div>
    </div>
    <div id="watchlist-chips"></div>
  </div>

  <div class="card">
    <h3>個股查詢</h3>
    <div class="row">
      <div class="field">
        <label>股票代號</label>
        <input type="text" id="query-stock-id" placeholder="2330" style="width:110px" />
      </div>
      <div class="field">
        <label>顯示天數</label>
        <input type="number" id="query-days" value="30" min="1" max="90" style="width:70px" />
      </div>
      <button class="btn sm" onclick="queryStock()">查詢</button>
      <button class="btn sm ghost" id="btn-push-stock" onclick="pushStock()" style="margin-left:auto">✈️ 推播</button>
    </div>
  </div>

  <div id="stock-summary"></div>
  <div class="card" id="stock-table-card" style="display:none">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <h3 style="margin:0">歷史紀錄</h3>
      <span id="stock-title" style="font-size:.85rem;color:var(--muted)"></span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>大戶流向(張)</th>
            <th>散戶流向(張)</th>
            <th>集中度</th>
            <th>7日累計(張)</th>
            <th>訊號</th>
          </tr>
        </thead>
        <tbody id="stock-tbody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /tab-stock -->


<!-- ═══════════════════════════════════════════════ 全市場 ═══ -->
<div id="tab-market" class="tab-content">

  <div class="card">
    <h3>全市場大戶排行</h3>
    <div class="row">
      <div class="field">
        <label>查詢日期 (YYYYMMDD)</label>
        <input type="text" id="market-date" placeholder="今日" style="width:140px" />
      </div>
      <div class="field">
        <label>排名前 N</label>
        <input type="number" id="market-top" value="30" min="5" max="100" style="width:70px" />
      </div>
      <button class="btn sm" onclick="queryMarket()">查詢</button>
      <button class="btn sm ghost" onclick="pushMarket()" style="margin-left:auto">📡 推播排行</button>
    </div>
  </div>

  <div class="card" id="market-table-card">
    <h3>排行榜</h3>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>代號</th>
            <th>訊號</th>
            <th>大戶流向(張)</th>
            <th>散戶流向(張)</th>
            <th>集中度</th>
            <th>7日累計(張)</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="market-tbody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /tab-market -->


<!-- ═══════════════════════════════════════════════ 設定 ═══ -->
<div id="tab-settings" class="tab-content">

  <div class="settings-grid">

    <div class="card">
      <h3>Telegram 推播設定</h3>
      <div class="field" style="margin-bottom:12px">
        <label>Bot Token</label>
        <input type="password" id="tg-token" placeholder="1234567890:ABCDEF..." style="width:100%" />
      </div>
      <div class="field" style="margin-bottom:16px">
        <label>Chat ID</label>
        <input type="text" id="tg-chatid" placeholder="例：-100xxxxxxx 或您的 user_id" style="width:100%" />
      </div>
      <div class="row">
        <button class="btn sm" onclick="saveTelegram()">💾 儲存</button>
        <button class="btn sm ghost" onclick="testTelegram()">📨 發送測試</button>
      </div>
      <div id="tg-status" style="margin-top:10px;font-size:.82rem;color:var(--muted)"></div>
    </div>

    <div class="card">
      <h3>自訂推播訊息</h3>
      <div class="field" style="margin-bottom:12px">
        <label>訊息內容</label>
        <textarea id="custom-msg" rows="4" placeholder="輸入要推播的訊息..." style="width:100%;background:#0f1117;border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:.9rem;resize:vertical;outline:none"></textarea>
      </div>
      <button class="btn sm" onclick="pushCustom()">✈️ 推播</button>
    </div>

  </div>

  <div class="card">
    <h3>系統狀態</h3>
    <div id="sys-status-content" style="font-size:.85rem;line-height:1.8;color:var(--muted)">
      載入中...
    </div>
    <button class="btn sm ghost" onclick="loadStatus()" style="margin-top:12px">🔃 重新整理</button>
  </div>

  <div class="card">
    <h3>推播紀錄</h3>
    <div id="push-log-content"><div class="loading">載入中...</div></div>
  </div>

</div><!-- /tab-settings -->

</main>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════
// Toast
// ════════════════════════════════════════════════
let toastTimer;
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

// ════════════════════════════════════════════════
// Tab switch
// ════════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const btns = document.querySelectorAll('nav button');
  const tabMap = {stock: 0, market: 1, settings: 2};
  btns[tabMap[name]].classList.add('active');
  if (name === 'settings') { loadStatus(); loadPushLog(); loadTgSettings(); }
  if (name === 'market') { queryMarket(); }
}

// ════════════════════════════════════════════════
// API helpers
// ════════════════════════════════════════════════
async function api(method, path, body=null) {
  const opts = { method, headers: {'Content-Type': 'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}

// ════════════════════════════════════════════════
// Status pill
// ════════════════════════════════════════════════
async function loadStatusPill() {
  try {
    const s = await api('GET', '/api/status');
    document.getElementById('status-pill').textContent =
      `cache ${s.cache_count} 筆 · ${s.watchlist_count} 支股票 · CSV ${s.csv_count} 個`;
  } catch(e) {}
}

// ════════════════════════════════════════════════
// Watchlist
// ════════════════════════════════════════════════
let watchlist = [];

async function loadWatchlist() {
  watchlist = await api('GET', '/api/watchlist');
  const container = document.getElementById('watchlist-chips');
  if (!watchlist.length) {
    container.innerHTML = '<span style="color:var(--muted);font-size:.85rem">尚無股票，請新增</span>';
    return;
  }
  container.innerHTML = watchlist.map(w => `
    <div class="chip">
      <span>${w.stock_id}${w.name ? ' ' + w.name : ''}</span>
      <span class="del" onclick="delStock('${w.stock_id}')">✕</span>
    </div>
  `).join('');
}

async function addStock() {
  const sid  = document.getElementById('new-stock-id').value.trim();
  const name = document.getElementById('new-stock-name').value.trim();
  if (!sid) { toast('請輸入股票代號', true); return; }
  try {
    await api('POST', '/api/watchlist', {stock_id: sid, name});
    document.getElementById('new-stock-id').value = '';
    document.getElementById('new-stock-name').value = '';
    toast(`已新增 ${sid}`);
    await loadWatchlist();
  } catch(e) { toast(e.message, true); }
}

async function delStock(sid) {
  try {
    await api('DELETE', `/api/watchlist/${sid}`);
    toast(`已刪除 ${sid}`);
    await loadWatchlist();
  } catch(e) { toast(e.message, true); }
}

// ════════════════════════════════════════════════
// Refresh
// ════════════════════════════════════════════════
async function triggerRefresh() {
  const btn  = document.getElementById('btn-refresh');
  const days = parseInt(document.getElementById('backfill-days').value) || 30;
  btn.disabled = true;
  btn.textContent = '⏳ 更新中...';
  try {
    const r = await api('POST', '/api/refresh', {backfill: days});
    toast(`更新完成：${r.updated.join(', ')}（${r.days} 天）`);
    await loadStatusPill();
  } catch(e) {
    toast(e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 更新資料';
  }
}

// ════════════════════════════════════════════════
// Stock Query
// ════════════════════════════════════════════════
let currentStockRecords = [];
let currentStockId = '';

async function queryStock() {
  const sid  = document.getElementById('query-stock-id').value.trim();
  const days = parseInt(document.getElementById('query-days').value) || 30;
  if (!sid) { toast('請輸入股票代號', true); return; }
  try {
    const r = await api('GET', `/api/stock/${sid}?days=${days}`);
    currentStockRecords = r.data;
    currentStockId = sid;
    renderStockTable(sid, r.data);
  } catch(e) {
    toast(e.message, true);
  }
}

function renderStockTable(sid, data) {
  if (!data || !data.length) {
    document.getElementById('stock-summary').innerHTML = '';
    document.getElementById('stock-table-card').style.display = 'none';
    toast('查無資料，請先更新', true);
    return;
  }

  const latest = data[data.length - 1];
  const recent7 = data.slice(-7);
  const cum7 = recent7.reduce((s, r) => s + (r.whale_flow_lots || 0), 0);

  // Summary cards
  document.getElementById('stock-summary').innerHTML = `
    <div class="metric">
      <div class="lbl">最新訊號</div>
      <div class="val" style="font-size:1.2rem">${latest.signal_emoji} ${latest.signal_title}</div>
    </div>
    <div class="metric">
      <div class="lbl">大戶流向（今日）</div>
      <div class="val ${latest.whale_flow_lots >= 0 ? 'pos' : 'neg'}">${fmtNum(latest.whale_flow_lots)} 張</div>
    </div>
    <div class="metric">
      <div class="lbl">散戶流向（今日）</div>
      <div class="val ${latest.retail_flow_lots >= 0 ? 'pos' : 'neg'}">${fmtNum(latest.retail_flow_lots)} 張</div>
    </div>
    <div class="metric">
      <div class="lbl">7日累計大戶</div>
      <div class="val ${cum7 >= 0 ? 'pos' : 'neg'}">${fmtNum(cum7)} 張</div>
    </div>
    <div class="metric">
      <div class="lbl">集中度</div>
      <div class="val">${(latest.concentration_index || 0).toFixed(3)}</div>
    </div>
  `;

  document.getElementById('stock-title').textContent = `${sid} · ${data.length} 筆`;
  const tbody = document.getElementById('stock-tbody');
  const rows = [...data].reverse();
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${r.date}</td>
      <td class="${r.whale_flow_lots >= 0 ? 'pos' : 'neg'}">${fmtNum(r.whale_flow_lots)}</td>
      <td class="${r.retail_flow_lots >= 0 ? 'pos' : 'neg'}">${fmtNum(r.retail_flow_lots)}</td>
      <td class="${r.concentration_index >= 0 ? 'pos' : 'neg'}">${(r.concentration_index || 0).toFixed(3)}</td>
      <td class="${(r.cum7_whale || 0) >= 0 ? 'pos' : 'neg'}">${fmtNum(r.cum7_whale)}</td>
      <td>${r.signal_emoji} ${r.signal_title}</td>
    </tr>
  `).join('');
  document.getElementById('stock-table-card').style.display = 'block';
}

async function pushStock() {
  const sid = currentStockId || document.getElementById('query-stock-id').value.trim();
  if (!sid) { toast('請先查詢個股', true); return; }
  try {
    await api('POST', `/api/telegram/push/${sid}`);
    toast(`✅ ${sid} 推播成功`);
  } catch(e) { toast(e.message, true); }
}

// ════════════════════════════════════════════════
// Market Rankings
// ════════════════════════════════════════════════
async function queryMarket() {
  const dt  = document.getElementById('market-date').value.trim();
  const top = parseInt(document.getElementById('market-top').value) || 30;
  try {
    const r = await api('GET', `/api/market/rankings?date=${dt}&top=${top}`);
    renderMarketTable(r.data, r.date);
  } catch(e) { toast(e.message, true); }
}

function renderMarketTable(data, dt) {
  const tbody = document.getElementById('market-tbody');
  if (!data || !data.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="color:var(--muted);text-align:center;padding:30px">無資料（請先在個股頁更新）</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map((r, i) => `
    <tr>
      <td>${i+1}</td>
      <td><b>${r.stock_id}</b></td>
      <td>${r.signal_emoji} ${r.signal_title}</td>
      <td class="${r.whale_flow_lots >= 0 ? 'pos' : 'neg'}">${fmtNum(r.whale_flow_lots)}</td>
      <td class="${r.retail_flow_lots >= 0 ? 'pos' : 'neg'}">${fmtNum(r.retail_flow_lots)}</td>
      <td class="${r.concentration_index >= 0 ? 'pos' : 'neg'}">${(r.concentration_index || 0).toFixed(3)}</td>
      <td class="${(r.cum7_whale || 0) >= 0 ? 'pos' : 'neg'}">${fmtNum(r.cum7_whale)}</td>
      <td>
        <button class="btn sm ghost" onclick="pushSingleFromMarket('${r.stock_id}')">✈️</button>
      </td>
    </tr>
  `).join('');
}

async function pushSingleFromMarket(sid) {
  try {
    await api('POST', `/api/telegram/push/${sid}`);
    toast(`✅ ${sid} 推播成功`);
  } catch(e) { toast(e.message, true); }
}

async function pushMarket() {
  const dt  = document.getElementById('market-date').value.trim();
  const top = parseInt(document.getElementById('market-top').value) || 30;
  try {
    await api('POST', '/api/telegram/push-market', {date: dt || null, top});
    toast('📡 全市場排行推播成功');
  } catch(e) { toast(e.message, true); }
}

// ════════════════════════════════════════════════
// Settings
// ════════════════════════════════════════════════
async function loadTgSettings() {
  try {
    const s = await api('GET', '/api/settings');
    document.getElementById('tg-status').textContent =
      s.has_token ? `Token: ${s.telegram_token_masked}  Chat ID: ${s.telegram_chat_id}` : '尚未設定';
  } catch(e) {}
}

async function saveTelegram() {
  const token   = document.getElementById('tg-token').value.trim();
  const chat_id = document.getElementById('tg-chatid').value.trim();
  if (!token || !chat_id) { toast('請填寫 Token 與 Chat ID', true); return; }
  try {
    await api('POST', '/api/settings/telegram', {token, chat_id});
    toast('✅ Telegram 設定已儲存');
    loadTgSettings();
    document.getElementById('tg-token').value = '';
  } catch(e) { toast(e.message, true); }
}

async function testTelegram() {
  try {
    await api('POST', '/api/telegram/test');
    toast('✅ 測試訊息發送成功，請查看手機');
  } catch(e) { toast(e.message, true); }
}

async function pushCustom() {
  const text = document.getElementById('custom-msg').value.trim();
  if (!text) { toast('請輸入訊息', true); return; }
  try {
    await api('POST', '/api/telegram/push-custom', {text});
    toast('✅ 自訂訊息推播成功');
    document.getElementById('custom-msg').value = '';
  } catch(e) { toast(e.message, true); }
}

async function loadStatus() {
  try {
    const s = await api('GET', '/api/status');
    document.getElementById('sys-status-content').innerHTML = `
      Cache 筆數：<b>${s.cache_count}</b><br>
      觀察清單：<b>${s.watchlist_count}</b> 支<br>
      CSV 檔案：<b>${s.csv_count}</b> 個<br>
      最後更新：<b>${s.last_refresh || '從未'}</b><br>
      資料目錄：<code style="font-size:.8rem">${s.data_dir}</code>
    `;
  } catch(e) { document.getElementById('sys-status-content').textContent = '無法取得狀態'; }
}

async function loadPushLog() {
  try {
    const logs = await api('GET', '/api/push-log?limit=20');
    const container = document.getElementById('push-log-content');
    if (!logs.length) { container.innerHTML = '<div style="color:var(--muted);font-size:.85rem">尚無推播紀錄</div>'; return; }
    container.innerHTML = logs.map(l => `
      <div class="log-item">
        <span>${l.ok ? '✅' : '❌'}</span>
        <span style="color:var(--muted)">${(l.pushed_at||'').slice(0,16)}</span>
        <span><b>${l.stock_id || '-'}</b></span>
        <span>${l.signal_emoji || ''} ${l.signal_title || ''}</span>
      </div>
    `).join('');
  } catch(e) {}
}

// ════════════════════════════════════════════════
// Helpers
// ════════════════════════════════════════════════
function fmtNum(n) {
  if (n == null || n === '') return '-';
  const num = parseFloat(n);
  if (isNaN(num)) return '-';
  return (num >= 0 ? '+' : '') + num.toLocaleString('zh-TW');
}

// ════════════════════════════════════════════════
// Init
// ════════════════════════════════════════════════
(async function init() {
  await loadWatchlist();
  await loadStatusPill();
})();
</script>

</body>
</html>
